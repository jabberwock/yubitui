name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: yubitui-linux-amd64
            binary_name: yubitui
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: yubitui-macos-amd64
            binary_name: yubitui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: yubitui-windows-amd64.exe
            binary_name: yubitui.exe
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libudev-dev

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Rename binary
        shell: bash
        run: |
          cp target/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/yubitui-linux-amd64/yubitui-linux-amd64
            artifacts/yubitui-macos-amd64/yubitui-macos-amd64
            artifacts/yubitui-windows-amd64.exe/yubitui-windows-amd64.exe
